<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coreconics Payment</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7ff;
}

header{
background:white;
padding:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo{
height:70px;
}

.container{
text-align:center;
margin-top:80px;
}

h2{
color:#1a4cff;
}

input{
padding:15px;
font-size:18px;
width:220px;
border:2px solid #1a4cff;
border-radius:8px;
}

button{
margin-top:20px;
padding:14px 35px;
font-size:18px;
border:none;
background:#1a4cff;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="container">

<h2>Enter Payment Amount</h2>

<input type="number" id="amount" placeholder="Enter amount">

<br>

<button onclick="next()">Proceed</button>

</div>

<script>

function next(){

let amt=document.getElementById("amount").value;

if(amt==""){
alert("Please enter amount");
return;
}

window.location.href="pay.html?amount="+amt;

}

</script>

</body>
</html>
